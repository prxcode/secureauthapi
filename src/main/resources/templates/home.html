<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAuthAPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* Top navbar */
        .navbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #111;
        }

        .navbar span {
            font-size: 0.8rem;
            color: #666;
        }

        .main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Simple card */
        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #111;
        }

        .hidden {
            display: none !important;
        }

        /* Form */
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #444;
            margin-bottom: 0.3rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.5rem 0.7rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: #333;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            text-align: center;
        }

        .btn-dark {
            background: #111;
            color: #fff;
            border-color: #111;
            width: 100%;
        }

        .btn-dark:hover {
            background: #333;
        }

        .btn-outline {
            background: #fff;
            color: #333;
            border-color: #ccc;
        }

        .btn-outline:hover {
            background: #f0f0f0;
        }

        .btn-red {
            background: #fff;
            color: #c00;
            border-color: #c00;
        }

        .btn-red:hover {
            background: #c00;
            color: #fff;
        }

        /* Error alert */
        .alert-error {
            background: #fff0f0;
            border: 1px solid #f5c6c6;
            color: #a00;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }

        .credentials-hint {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #666;
            line-height: 1.6;
        }

        /* Dashboard two-column layout */
        .dashboard-grid {
            display: flex;
            gap: 1rem;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        @media (max-width: 700px) {
            .dashboard-grid {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }

        /* User info block */
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #111;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .user-role {
            font-size: 0.75rem;
            color: #666;
            background: #f0f0f0;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
        }

        /* Section labels */
        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .action-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        /* Console log area */
        .console-box {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 0.75rem;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.5;
            width: 100%;
        }

        .console-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: #666;
            margin-bottom: 0.4rem;
        }

        /* Small progress bar for rate limit test */
        .progress-wrap {
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: #111;
            width: 0%;
            transition: width 0.1s ease;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>SecureAuthAPI</h1>
        <span>Made by @prxcode</span>
    </div>

    <div class="main">

        <!-- LOGIN CARD -->
        <div id="loginCard" class="card" style="max-width: 400px; margin: 3rem auto;">
            <h2>Sign In</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="testuser" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="password123" required>

                <button type="submit" class="btn btn-dark">Sign In</button>
            </form>

            <div id="loginAlert" class="alert-error hidden"></div>

            <div class="credentials-hint">
                <strong>Demo accounts:</strong><br>
                User: testuser / password123<br>
                Admin: admin / admin123
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardCard" class="hidden">
            <div class="dashboard-grid">

                <!-- Left sidebar -->
                <div class="sidebar">
                    <div class="card">
                        <div class="user-info">
                            <div class="user-avatar" id="avatarLetter">U</div>
                            <div>
                                <div class="user-name" id="displayUsername">User</div>
                                <span class="user-role" id="displayRole">ROLE_USER</span>
                            </div>
                        </div>

                        <div class="section-label">API Requests</div>
                        <div class="action-list">
                            <button class="btn btn-outline" onclick="fetchProfile()">GET /api/user/me</button>
                            <button class="btn btn-outline" onclick="fetchAdminData()">GET /api/admin</button>
                        </div>

                        <div class="section-label">Rate Limit Test</div>
                        <div class="action-list">
                            <button class="btn btn-outline" onclick="triggerRateLimitTest()">Fire 15 Requests</button>
                        </div>
                        <div class="progress-wrap" id="progressWrap">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>

                        <div style="margin-top: 1.5rem;">
                            <button class="btn btn-red" onclick="handleLogout()" style="width:100%;">Sign Out</button>
                        </div>
                    </div>
                </div>

                <!-- Right content: console log -->
                <div class="content">
                    <div class="card" style="padding: 1rem;">
                        <div class="console-title">Server Response Log</div>
                        <div class="console-box" id="consoleLog">Ready. Perform an action to see server responses here.
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        window.addEventListener('load', function () {
            var token = localStorage.getItem('jwt_token');
            if (token) restoreSession(token);
        });

        function log(msg) {
            var el = document.getElementById('consoleLog');
            var ts = new Date().toLocaleTimeString();
            var line = '[' + ts + '] ' + msg + '\n\n';
            if (el.textContent.indexOf('Ready.') === 0) {
                el.textContent = line;
            } else {
                el.textContent = line + el.textContent;
            }
        }

        function restoreSession(token) {
            fetch('/api/user/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function (res) {
                    if (!res.ok) throw new Error('expired');
                    return res.json();
                })
                .then(function (data) {
                    showDashboard(data.username, data.role);
                    log('[INFO] Session restored for ' + data.username);
                })
                .catch(function () {
                    localStorage.removeItem('jwt_token');
                });
        }

        function showDashboard(username, role) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');
            document.getElementById('displayUsername').textContent = username;
            document.getElementById('displayRole').textContent = role;
            document.getElementById('avatarLetter').textContent = username.charAt(0).toUpperCase();
        }

        function showLogin() {
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('dashboardCard').classList.add('hidden');
        }

        function handleLogin(e) {
            e.preventDefault();
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            var alertEl = document.getElementById('loginAlert');
            alertEl.classList.add('hidden');

            log('[INFO] POST /auth/login for user "' + user + '"');

            fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
                .then(function (res) {
                    return res.json().then(function (data) {
                        if (!res.ok) return Promise.reject(data);
                        return data;
                    });
                })
                .then(function (data) {
                    localStorage.setItem('jwt_token', data.token);
                    log('[OK] Login successful. Token received.');

                    return fetch('/api/user/me', {
                        headers: { 'Authorization': 'Bearer ' + data.token }
                    }).then(function (r) { return r.json(); });
                })
                .then(function (profile) {
                    showDashboard(profile.username, profile.role);
                })
                .catch(function (err) {
                    alertEl.textContent = err.message || 'Authentication failed.';
                    alertEl.classList.remove('hidden');
                    log('[FAIL] ' + (err.message || 'Login rejected'));
                });
        }

        function fetchProfile() {
            var token = localStorage.getItem('jwt_token');
            log('[INFO] GET /api/user/me');

            fetch('/api/user/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function (res) {
                    return res.json().then(function (d) {
                        if (!res.ok) return Promise.reject(d);
                        return d;
                    });
                })
                .then(function (data) {
                    log('[OK] Response:\n' + JSON.stringify(data, null, 2));
                })
                .catch(function (err) {
                    log('[FAIL] ' + JSON.stringify(err, null, 2));
                });
        }

        function fetchAdminData() {
            var token = localStorage.getItem('jwt_token');
            log('[INFO] GET /api/admin');

            fetch('/api/admin', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function (res) {
                    if (res.status === 403) {
                        return Promise.reject({ error: 'Forbidden', message: 'ROLE_ADMIN required' });
                    }
                    return res.json().then(function (d) {
                        if (!res.ok) return Promise.reject(d);
                        return d;
                    });
                })
                .then(function (data) {
                    log('[OK] Response:\n' + JSON.stringify(data, null, 2));
                })
                .catch(function (err) {
                    log('[DENIED] ' + JSON.stringify(err, null, 2));
                });
        }

        function triggerRateLimitTest() {
            var token = localStorage.getItem('jwt_token');
            var wrap = document.getElementById('progressWrap');
            var fill = document.getElementById('progressFill');
            wrap.style.display = 'block';
            fill.style.width = '0%';

            log('[INFO] Rate limit test: sending 15 requests to /api/user/me...');

            var i = 0;
            var total = 15;

            function next() {
                if (i >= total) {
                    setTimeout(function () { wrap.style.display = 'none'; }, 800);
                    return;
                }
                i++;
                fill.style.width = ((i / total) * 100) + '%';

                fetch('/api/user/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                    .then(function (res) {
                        if (res.status === 429) {
                            return res.json().then(function (d) {
                                log('[429] Request ' + i + ': Rate limited - ' + d.message);
                            });
                        } else if (res.ok) {
                            log('[200] Request ' + i + ': OK');
                        } else {
                            log('[' + res.status + '] Request ' + i);
                        }
                    })
                    .catch(function () {
                        log('[ERR] Request ' + i + ': Network error');
                    })
                    .finally(function () {
                        setTimeout(next, 100);
                    });
            }
            next();
        }

        function handleLogout() {
            var token = localStorage.getItem('jwt_token');
            log('[INFO] POST /auth/logout');

            fetch('/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function () {
                    log('[OK] Logged out. Token revoked.');
                    localStorage.removeItem('jwt_token');
                    showLogin();
                })
                .catch(function () {
                    log('[WARN] Could not reach server. Clearing local token.');
                    localStorage.removeItem('jwt_token');
                    showLogin();
                });
        }
    </script>
</body>

</html>
